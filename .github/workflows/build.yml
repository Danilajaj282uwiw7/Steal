name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pycryptodome pywin32 requests pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --hidden-import=win32crypt --hidden-import=Crypto installer.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/installer.exe
